function SS({value,onChange,options,placeholder}){
  const[open,setOpen]=useState(false);
  const[search,setSrch]=useState("");

  var isA=function(opt){return multi?(selected||[]).includes(opt):selected===opt;};
  return(<div style={{display:"flex",flexWrap:"wrap",gap:7}}>
    {options.map(function(opt){var a=isA(opt);return(<button key={opt} type="button" onClick={function(){tog(opt)}} style={{padding:"7px 14px",borderRadius:20,fontSize:13,fontFamily:ft,border:a?"1px solid rgba(59,130,246,0.3)":"1px solid rgba(255,255,255,0.1)",background:a?"rgba(59,130,246,0.12)":"rgba(255,255,255,0.04)",color:a?"#60a5fa":"#94a3b8",fontWeight:a?600:400,cursor:"pointer",transition:"all 0.15s"}}>{a?"✓ ":""}{opt}</button>);})}

function SelectorMasivo({ids,infoMap,data,setData,label}){
  var d=data,s=setData;
  var modo=d.modo||'individual';
  var placaFiltro=d.filtro_placa||'';
  var ciudadFiltro=d.filtro_ciudad||'';
  var placas=[],ciudades=[],seenP={},seenC={};
  ids.forEach(function(id){
    var info=infoMap[id]||{};
    if(info.placa&&!seenP[info.placa]){seenP[info.placa]=true;placas.push(info.placa);}
    if(info.ciudad&&!seenC[info.ciudad]){seenC[info.ciudad]=true;ciudades.push(info.ciudad);}
  });
  var idsFiltrados=ids.filter(function(id){
    var info=infoMap[id]||{};
    if(placaFiltro&&info.placa!==placaFiltro) return false;
    if(ciudadFiltro&&info.ciudad!==ciudadFiltro) return false;
    return true;
  });
  var toggleId=function(id){
    var sel=d.ids_seleccionados||[];
    var idx=sel.indexOf(id);
    if(idx>=0){sel=sel.filter(function(x){return x!==id;});}else{sel=sel.concat([id]);}
    s(Object.assign({},d,{ids_seleccionados:sel}));
  };
  return(<div>
    <Fd label="Modo de registro" hint={"Individual: una solicitud. Masivo: varias "+label+" a la vez"}>
      <div style={{display:"flex",gap:8}}>
        <button type="button" onClick={function(){s(Object.assign({},d,{modo:"individual",ids_seleccionados:[],filtro_placa:"",filtro_ciudad:""}));}} style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,fontFamily:ft,fontWeight:modo==="individual"?700:400,border:modo==="individual"?"1.5px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.1)",background:modo==="individual"?"rgba(59,130,246,0.1)":"rgba(255,255,255,0.04)",color:modo==="individual"?"#60a5fa":"#94a3b8",cursor:"pointer"}}>📋 Individual</button>
        <button type="button" onClick={function(){s(Object.assign({},d,{modo:"masivo",id_sol:""}));}} style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,fontFamily:ft,fontWeight:modo==="masivo"?700:400,border:modo==="masivo"?"1.5px solid rgba(124,58,237,0.4)":"1px solid rgba(255,255,255,0.1)",background:modo==="masivo"?"rgba(124,58,237,0.1)":"rgba(255,255,255,0.04)",color:modo==="masivo"?"#a78bfa":"#94a3b8",cursor:"pointer"}}>🚛 Masivo</button>
      </div>
    </Fd>
    {modo==="individual"&&<Fd label="ID Solicitud" req><SS value={d.id_sol} onChange={function(v){s(Object.assign({},d,{id_sol:v}));}} options={ids} placeholder="Seleccionar solicitud..."/></Fd>}
    {modo==="masivo"&&<div>
      <R2>
        {placas.length>0&&<Fd label="Filtrar por placa"><Si value={placaFiltro} onChange={function(v){s(Object.assign({},d,{filtro_placa:v,filtro_ciudad:"",ids_seleccionados:[]}));}} options={placas} placeholder="Todas"/></Fd>}
        {ciudades.length>0&&<Fd label="Filtrar por ciudad"><Si value={ciudadFiltro} onChange={function(v){s(Object.assign({},d,{filtro_ciudad:v,filtro_placa:"",ids_seleccionados:[]}));}} options={ciudades} placeholder="Todas"/></Fd>}
      </R2>
      <Fd label={"Solicitudes disponibles ("+idsFiltrados.length+")"}>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <button type="button" onClick={function(){s(Object.assign({},d,{ids_seleccionados:idsFiltrados.slice()}));}} style={{padding:"4px 12px",borderRadius:8,fontSize:11,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#94a3b8",cursor:"pointer",fontFamily:ft}}>Seleccionar todas</button>
          <button type="button" onClick={function(){s(Object.assign({},d,{ids_seleccionados:[]}));}} style={{padding:"4px 12px",borderRadius:8,fontSize:11,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#94a3b8",cursor:"pointer",fontFamily:ft}}>Deseleccionar</button>
          <span style={{fontSize:12,color:"#60a5fa",fontWeight:600,padding:"4px 8px"}}>{(d.ids_seleccionados||[]).length} seleccionadas</span>
        </div>
        <div style={{maxHeight:200,overflowY:"auto",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,background:"rgba(255,255,255,0.04)"}}>
          {idsFiltrados.map(function(id){var sel=(d.ids_seleccionados||[]).includes(id);var info=infoMap[id]||{};return(

        </div>

  </div>);

function ResumenPlaca({placa}){

  if(idsPlaca.length===0) return null;
  var totales={cv:0,cg:0,cf:0,tl:0,mb:0};

    totales.cg+=parseInt(info.cg)||0;
    totales.cf+=parseInt(info.cf)||0;
    totales.tl+=parseInt(info.tl)||0;
    totales.mb+=parseInt(info.mb)||0;
  });

    {k:"Confección",v:totales.cf,c:"#f97316"},
    {k:"Telas",v:totales.tl,c:"#2dd4bf"},

    var sums={cv:0,cg:0,cf:0,tl:0,mb:0};
    var prodsSet={};
    idsTienda.forEach(function(id){
      var info=IDS_INFO_RECOLECCION[id]||{};

            <div style={{padding:"20px 22px"}}>
              <div style={{background:"rgba(255,255,255,0.02)",borderRadius:12,padding:16,marginBottom:16,border:"1px solid rgba(255,255,255,0.06)"}}>
                <p style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:12}}>Crear nuevo usuario</p>
                <R2>
                  <Ti value={newUser.usuario||''} onChange={function(v){setNewUser(Object.assign({},newUser,{usuario:v}))}} placeholder="Usuario"/>
                  <input type="password" value={newUser.password||''} onChange={function(e){setNewUser(Object.assign({},newUser,{password:e.target.value}))}} placeholder="Contraseña" style={Object.assign({},bI,{padding:"10px 14px"})}/>
                </R2>
                <div style={{marginTop:10,marginBottom:10}}><Ti value={newUser.nombre||''} onChange={function(v){setNewUser(Object.assign({},newUser,{nombre:v}))}} placeholder="Nombre completo"/></div>
                <Fd label="Permisos">
                  <Ps options={["solicitudes","programacion","recoleccion","descargue","cierre","reportes","consulta","admin","vehiculos","cancelacion","solicitudes_textil","programacion_textil","recoleccion_textil","descargue_textil","cierre_textil","reportes_textil","consulta_textil","cancelacion_textil"]} selected={(newUser.permisos||'').split(',').filter(function(p){return p.trim()!=='';})} onChange={function(v){setNewUser(Object.assign({},newUser,{permisos:v.join(',')}))}} multi={true}/>
                </Fd>
                <button onClick={async function(){if(!newUser.usuario||!newUser.password||!newUser.nombre||!newUser.permisos)return;await adminAction('crear',newUser);setNewUser({});}} style={{padding:"10px 20px",background:"linear-gradient(135deg,#a855f7,#7c3aed)",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>Crear Usuario</button>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style={{fontSize:13,fontWeight:700,color:"#e2e8f0",margin:0}}>Usuarios existentes</p>
                  <button onClick={cargarListaUsuarios} disabled={adminLoading} style={{padding:"6px 14px",border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",borderRadius:8,fontSize:11,color:"#94a3b8",fontFamily:mn,cursor:"pointer"}}>{adminLoading?"Cargando...":"🔄 Cargar"}</button>
                </div>
                {adminUsers.length===0&&<p style={{fontSize:12,color:"#64748b",textAlign:"center",padding:10}}>Presiona "Cargar" para ver</p>}
                {adminUsers.map(function(u){
                  var permsArr=(u.permisos||'').split(',').map(function(p){return p.trim();}).filter(function(p){return p!=='';});
                  var isEditing=editUser&&editUser.usuario===u.usuario;
                  var editPerms=isEditing?(editUser.permisos||'').split(',').map(function(p){return p.trim();}).filter(function(p){return p!=='';}):permsArr;
                  return(<div key={u.usuario} style={{background:isEditing?"rgba(59,130,246,0.06)":"rgba(255,255,255,0.02)",borderRadius:12,padding:14,marginBottom:10,border:isEditing?"1px solid rgba(59,130,246,0.2)":"1px solid rgba(255,255,255,0.06)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div><span style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>{u.nombre}</span><span style={{fontSize:11,color:"#64748b",marginLeft:8,fontFamily:mn}}>@{u.usuario}</span></div>
                      <div style={{display:"flex",gap:6}}>
                        {!isEditing&&<button onClick={function(){setEditUser({usuario:u.usuario,permisos:u.permisos});}} style={{padding:"4px 10px",background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:6,fontSize:11,color:"#60a5fa",cursor:"pointer",fontFamily:mn}}>Editar</button>}
                        {isEditing&&<button onClick={async function(){await adminAction('editar',{usuario:editUser.usuario,permisos:editUser.permisos});setEditUser(null);}} style={{padding:"4px 10px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:6,fontSize:11,color:"#4ade80",cursor:"pointer",fontFamily:mn}}>Guardar</button>}
                        {isEditing&&<button onClick={function(){setEditUser(null);}} style={{padding:"4px 10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,fontSize:11,color:"#94a3b8",cursor:"pointer",fontFamily:mn}}>Cancelar</button>}
                      </div>
                    </div>
                    {isEditing?<Ps options={["solicitudes","programacion","recoleccion","descargue","cierre","reportes","consulta","admin","vehiculos","cancelacion","solicitudes_textil","programacion_textil","recoleccion_textil","descargue_textil","cierre_textil","reportes_textil","consulta_textil","cancelacion_textil"]} selected={editPerms} onChange={function(v){setEditUser(Object.assign({},editUser,{permisos:v.join(',')}));}} multi={true}/>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{permsArr.map(function(p){return <span key={p} style={{padding:"3px 10px",borderRadius:10,fontSize:11,background:"rgba(59,130,246,0.1)",color:"#60a5fa",fontWeight:500}}>{p}</span>;})}</div>}
                  </div>);
                })}
              </div>
            </div>
          </div>
        </div>}

        <p style={{textAlign:"center",marginTop:16,fontSize:11,color:"#475569",fontFamily:mn}}>⚙️ SISTEMA DE DEVOLUCIONES CONDOR</p>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
